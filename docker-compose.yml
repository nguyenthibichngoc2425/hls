services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: hlsdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    container_name: hls-postgres
    networks:
      - hls-network

  nginx:
    image: nginx:1.27-alpine
    container_name: hls-lb
    depends_on:
      - postgres
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hls-network

volumes:
  pgdata:

networks:
  hls-network:
    driver: bridge
