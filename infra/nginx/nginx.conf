worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    map $upstream_addr $lb_server {
        default "khong_xac_dinh";
        ~*8081,\s*.*8082 "8081 -> 8082";
        ~*8082,\s*.*8081 "8082 -> 8081";
        ~*:8081 "8081";
        ~*:8082 "8082";
    }

    map "$status|$upstream_status" $lb_retry {
        default "khong";
        ~^5\d\d\|.*,.+ "that_bai";
        ~^[1-4]\d\d\|.*,.+ "co";
    }

    log_format lblog '[LB] request="$request_uri" trang_thai=$status '
                     'server="$lb_server" retry="$lb_retry" '
                     'upstream_status="$upstream_status" xff="$http_x_forwarded_for"';

    access_log /dev/stdout lblog;
    error_log /dev/stderr info;

    upstream hls_backend {
        server 192.168.65.254:8081 max_fails=0;
        server 192.168.65.254:8082 max_fails=0;
    }

    upstream hls_backend_sticky {
        hash $arg_userEmail consistent;
        server 192.168.65.254:8081 max_fails=0;
        server 192.168.65.254:8082 max_fails=0;
    }

    map $arg_userEmail $hls_upstream {
        default hls_backend_sticky;
        "" hls_backend;
    }

    server {
        listen 80;
        server_name _;

        location /api/hls/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 2s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504 non_idempotent;
            proxy_next_upstream_tries 2;

            proxy_buffering off;
            proxy_pass http://$hls_upstream;
        }

        location /api/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 2s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504 non_idempotent;
            proxy_next_upstream_tries 2;

            proxy_pass http://hls_backend;
        }

        location / {
            return 200 'HLS Load Balancer is running\n';
            add_header Content-Type text/plain;
        }
    }
}